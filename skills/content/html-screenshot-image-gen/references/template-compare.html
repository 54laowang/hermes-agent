<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1080px;
            min-height: 1920px;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", 
                         "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 80px 60px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .title {
            font-size: 56px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 20px;
        }
        
        .subtitle {
            font-size: 28px;
            color: #666;
        }
        
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }
        
        .column {
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        
        .column-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 3px solid;
        }
        
        .column-a .column-title {
            color: #8b6f47;
            border-color: #8b6f47;
        }
        
        .column-b .column-title {
            color: #4ade80;
            border-color: #4ade80;
        }
        
        .items {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .item {
            font-size: 28px;
            color: #333;
            line-height: 1.6;
            padding-left: 32px;
            position: relative;
        }
        
        .item::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #999;
            font-weight: bold;
        }
        
        .footer {
            text-align: center;
            font-size: 24px;
            color: #999;
            padding-top: 40px;
            border-top: 2px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">{{title}}</div>
        {{#if subtitle}}
        <div class="subtitle">{{subtitle}}</div>
        {{/if}}
    </div>
    
    <div class="comparison-grid">
        <div class="column column-a">
            <div class="column-title">{{column_a_title}}</div>
            <div class="items">
                {{#each column_a_items}}
                <div class="item">{{this}}</div>
                {{/each}}
            </div>
        </div>
        
        <div class="column column-b">
            <div class="column-title">{{column_b_title}}</div>
            <div class="items">
                {{#each column_b_items}}
                <div class="item">{{this}}</div>
                {{/each}}
            </div>
        </div>
    </div>
    
    <div class="footer">{{date}}</div>
</body>
</html>
