<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1080px;
            height: 540px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", 
                         "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 80px;
            position: relative;
            overflow: hidden;
        }
        
        /* 装饰圆 */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(74, 222, 128, 0.08);
            top: -100px;
            right: -100px;
        }
        
        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(139, 111, 71, 0.08);
            bottom: -80px;
            left: -80px;
        }
        
        .tag {
            font-size: 22px;
            color: #4ade80;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 24px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        
        .title {
            font-size: 64px;
            font-weight: 700;
            color: white;
            line-height: 1.2;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        
        .subtitle {
            font-size: 28px;
            color: #aaa;
            margin-top: 24px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    {{#if tag}}
    <div class="tag">{{tag}}</div>
    {{/if}}
    <div class="title">{{title}}</div>
    {{#if subtitle}}
    <div class="subtitle">{{subtitle}}</div>
    {{/if}}
</body>
</html>
