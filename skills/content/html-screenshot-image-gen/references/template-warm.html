<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1080px;
            min-height: 1920px;
            background: #f5f0e8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", 
                         "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            margin-bottom: 60px;
        }
        
        .title {
            font-size: 64px;
            font-weight: 700;
            color: #2d2d2d;
            line-height: 1.3;
            margin-bottom: 20px;
        }
        
        .subtitle {
            font-size: 32px;
            color: #666;
            line-height: 1.5;
        }
        
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        .item-card {
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            display: flex;
            gap: 32px;
            align-items: flex-start;
        }
        
        .item-number {
            flex-shrink: 0;
            width: 72px;
            height: 72px;
            background: #8b6f47;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: white;
        }
        
        .item-content {
            flex: 1;
        }
        
        .item-title {
            font-size: 36px;
            font-weight: 600;
            color: #2d2d2d;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        
        .item-desc {
            font-size: 28px;
            color: #666;
            line-height: 1.6;
        }
        
        .footer {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 2px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .footer-text {
            font-size: 24px;
            color: #999;
        }
        
        .footer-source {
            font-size: 24px;
            color: #8b6f47;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">{{title}}</div>
        {{#if subtitle}}
        <div class="subtitle">{{subtitle}}</div>
        {{/if}}
    </div>
    
    <div class="content">
        {{#each items}}
        <div class="item-card">
            <div class="item-number">{{@index}}</div>
            <div class="item-content">
                <div class="item-title">{{this.title}}</div>
                {{#if this.desc}}
                <div class="item-desc">{{this.desc}}</div>
                {{/if}}
            </div>
        </div>
        {{/each}}
    </div>
    
    <div class="footer">
        <div class="footer-text">{{date}}</div>
        {{#if source}}
        <div class="footer-source">{{source}}</div>
        {{/if}}
    </div>
</body>
</html>
