<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content=1080, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1080px;
            min-height: 1920px;
            background: #0d0d0d;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", 
                         "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 120px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            text-align: center;
        }
        
        .highlight {
            font-size: 180px;
            font-weight: 800;
            color: #4ade80;
            line-height: 1;
            margin-bottom: 40px;
            letter-spacing: -4px;
        }
        
        .title {
            font-size: 56px;
            font-weight: 600;
            color: white;
            line-height: 1.4;
            margin-bottom: 30px;
        }
        
        .subtitle {
            font-size: 36px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 80px;
        }
        
        .items {
            display: flex;
            flex-direction: column;
            gap: 32px;
            margin-top: 60px;
        }
        
        .item {
            font-size: 32px;
            color: #ccc;
            line-height: 1.6;
            padding: 24px 0;
            border-bottom: 1px solid #333;
        }
        
        .item:last-child {
            border-bottom: none;
        }
        
        .item-highlight {
            color: #4ade80;
            font-weight: 600;
        }
        
        .footer {
            margin-top: 80px;
            font-size: 24px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        {{#if highlight}}
        <div class="highlight">{{highlight}}</div>
        {{/if}}
        
        <div class="title">{{title}}</div>
        
        {{#if subtitle}}
        <div class="subtitle">{{subtitle}}</div>
        {{/if}}
        
        {{#if items}}
        <div class="items">
            {{#each items}}
            <div class="item">
                {{#if this.highlight}}
                <span class="item-highlight">{{this.highlight}}</span>
                {{/if}}
                {{this.text}}
            </div>
            {{/each}}
        </div>
        {{/if}}
        
        {{#if date}}
        <div class="footer">{{date}}</div>
        {{/if}}
    </div>
</body>
</html>
