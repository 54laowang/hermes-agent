name: Security & Architecture Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # 每周一早上 6:00 运行
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  security-check:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install agchk

      - name: Run security check
        run: python scripts/security_check.py

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: /tmp/pre-commit-audit.json
          retention-days: 30

  architecture-audit:
    name: Architecture Health Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install agchk
        run: |
          python -m pip install --upgrade pip
          pip install agchk

      - name: Run agchk audit
        run: |
          agchk audit --profile personal . \
            -o audit-results.json \
            -r audit-report.md

      - name: Parse audit results
        id: audit
        run: |
          # 提取成熟度评分
          SCORE=$(python -c "import json; data=json.load(open('audit-results.json')); print(data['maturity_score']['score'])")
          ERA=$(python -c "import json; data=json.load(open('audit-results.json')); print(data['maturity_score']['era_name'])")
          HEALTH=$(python -c "import json; data=json.load(open('audit-results.json')); print(data['executive_verdict']['overall_health'])")

          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "era=$ERA" >> $GITHUB_OUTPUT
          echo "health=$HEALTH" >> $GITHUB_OUTPUT

          # 统计问题
          CRITICAL=$(python -c "import json; data=json.load(open('audit-results.json')); print(data['severity_summary'].get('critical', 0))")
          HIGH=$(python -c "import json; data=json.load(open('audit-results.json')); print(data['severity_summary'].get('high', 0))")

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT

      - name: Create audit summary
        run: |
          echo "## 🏗️ Architecture Health Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Era** | ${{ steps.audit.outputs.era }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Score** | ${{ steps.audit.outputs.score }}/100 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Health** | ${{ steps.audit.outputs.health }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Critical Issues** | ${{ steps.audit.outputs.critical }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **High Issues** | ${{ steps.audit.outputs.high }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 **Full Report**: [audit-report.md](./audit-report.md)" >> $GITHUB_STEP_SUMMARY

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-audit
          path: |
            audit-results.json
            audit-report.md
          retention-days: 90

      - name: Fail on critical issues
        if: steps.audit.outputs.critical > 0
        run: |
          echo "::error::Found ${{ steps.audit.outputs.critical }} critical issues"
          exit 1

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8

      - name: Check code formatting
        run: black --check .

      - name: Check import sorting
        run: isort --check-only .

      - name: Lint with flake8
        run: flake8 . --max-line-length=100 --ignore=E203,W503

  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true

  notification:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [security-check, architecture-audit]
    if: failure()

    steps:
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != null
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "⚠️ Hermes Agent 安全审计发现问题",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*⚠️ 安全审计失败*\n\n仓库: ${{ github.repository }}\n分支: ${{ github.ref_name }}\n提交: ${{ github.sha }}\n\n请检查审计报告并修复问题。"
                  }
                }
              ]
            }' \
            $SLACK_WEBHOOK_URL
