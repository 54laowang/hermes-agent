# Pre-commit hooks 配置
# 文档: https://pre-commit.com

repos:
  # 通用检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  # Python 代码格式
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3

  # Python 导入排序
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Python 语法检查
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=100', '--ignore=E203,W503']

  # 自定义安全检查
  - repo: local
    hooks:
      - id: security-check
        name: Security Check
        entry: python scripts/security_check.py
        language: system
        types: [python]
        pass_filenames: false
        verbose: true

      - id: agchk-audit
        name: Architecture Health Check
        entry: bash -c 'agchk audit --profile personal . -o /tmp/pre-commit-audit.json 2>&1 | head -20'
        language: system
        pass_filenames: false
        verbose: true
        stages: [manual]  # 手动触发，避免每次提交都运行

# 全局配置
default_language_version:
  python: python3

# 跳过某些文件的检查
exclude: |
  (?x)^(
      \.git/|
      __pycache__/|
      node_modules/|
      \.venv/|
      venv/|
      build/|
      dist/|
      \.egg-info/|
      tests/fixtures/|
     .*\.min\.js|
     .*\.min\.css
  )$

# CI 配置
ci:
  autofix_commit_msg: |
    style: 自动格式化 [pre-commit.ci]

    对以下文件应用自动格式化:
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: 'chore: 更新 pre-commit hooks'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
