# Pre-commit hooks 简化配置
# 只保留核心检查，减少等待时间

repos:
  # 私钥检测（最重要）
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: detect-private-key
        name: 🔑 检测私钥泄露

  # 自定义安全检查（可选，手动触发）
  - repo: local
    hooks:
      - id: security-check-manual
        name: 🔒 安全检查（手动）
        entry: python scripts/security_check.py
        language: system
        types: [python]
        pass_filenames: false
        stages: [manual]  # 只在手动运行时触发

# 默认跳过所有 hooks（允许快速提交）
# 如需检查，手动运行：pre-commit run --all-files
